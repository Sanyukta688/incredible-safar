<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Us - Incredible Suffer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="icon" href="../assets/favicon.ico">
  </head>

  <body>
    <header class="header">
      <h1>Contact Incredible Safarr</h1>
      <p>Your Journey Begins Here 🌍</p>
    </header>

    <div class="container">
      <section class="contact-wrapper">
        <!-- Contact Form -->
        <div class="contact-form">
          <h2>Send Us a Message</h2>

          <form>
            <label>Your Name:</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Your Email:</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Your Message:</label>
            <textarea name="message" rows="5" placeholder="Write your message..." required></textarea>

            <button type="submit">Submit Message</button>
          </form>
        </div>

        <!-- Contact Details -->
        <div class="contact-details">
          <h2>Contact Details</h2>

          <div class="detail-box">
            <h4>📞 Phone</h4>
            <p>+91 98765 43210</p>
          </div>

          <div class="detail-box">
            <h4>📧 Email</h4>
            <p>info@incrediblesafar.com</p>
          </div>

          <div class="detail-box">
            <h4>📍 Address</h4>
            <p>Jaitala Road, Nagpur, Maharashtra, India</p>
          </div>
        </div>
      </section>

      <!-- Map -->
      <section class="map-section">
        <h2>Our Location</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3721.9232990312867!2d79.03115035182397!3d21.11562387632418!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bd4c00af80e04df%3A0xa9bc89cb8f8e4b09!2sJaitala%20Rd%2C%20Nagpur%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1772889669019!5m2!1sen!2sin" loading="lazy"></iframe>
      </section>

      <!-- Social -->
      <section class="social-section">
        <h2>Follow Us</h2>
        <div class="social-links">
          <a href="#">Facebook</a>
          <a href="#">Instagram</a>
          <a href="#">Twitter</a>
          <a href="#">LinkedIn</a>
        </div>
      </section>
    </div>
  </body>
</html>
