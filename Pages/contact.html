<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Us - Incredible Suffer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/contact.css" />
  </head>

  <body>
    <header class="header">
      <h1>Contact Incredible Suffer</h1>
      <p>Your Journey Begins Here 🌍</p>
    </header>

    <div class="container">
      <section class="contact-wrapper">
        <!-- Contact Form -->
        <div class="contact-form">
          <h2>Send Us a Message</h2>

          <form>
            <label>Your Name</label>
            <input
              type="text"
              name="name"
              placeholder="Enter your name"
              required
            />

            <label>Your Email</label>
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />

            <label>Your Message</label>
            <textarea
              name="message"
              rows="5"
              placeholder="Write your message..."
              required
            ></textarea>

            <button type="submit">Submit Message</button>
          </form>
        </div>

        <!-- Contact Details -->
        <div class="contact-details">
          <h2>Contact Details</h2>

          <div class="detail-box">
            <h4>📞 Phone</h4>
            <p>+91 98765 43210</p>
          </div>

          <div class="detail-box">
            <h4>📧 Email</h4>
            <p>info@incrediblesuffer.com</p>
          </div>

          <div class="detail-box">
            <h4>📍 Address</h4>
            <p>MG Road, Mumbai, Maharashtra, India</p>
          </div>
        </div>
      </section>

      <!-- Map -->
      <section class="map-section">
        <h2>Our Location</h2>
        <iframe
          src="https://www.google.com/maps?q=Nagpur&output=embed"
          loading="lazy"
        >
        </iframe>
      </section>

      <!-- Social -->
      <section class="social-section">
        <h2>Follow Us</h2>
        <div class="social-links">
          <a href="#">Facebook</a>
          <a href="#">Instagram</a>
          <a href="#">Twitter</a>
          <a href="#">LinkedIn</a>
        </div>
      </section>
    </div>
  </body>
</html>
